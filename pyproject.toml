[tool.ruff]
line-length = 120
target-version = "py310"

[tool.ruff.lint]
# Default rule set (E4, E7, E9, F) plus ambiguous-name checks.
select = ["E4", "E7", "E9", "F", "E741"]
ignore = [
    "E701",  # multiple statements on one line (colon) - compact guard clauses
    "E702",  # multiple statements on one line (semicolon) - same convention
]

[tool.ruff.lint.per-file-ignores]
# Package __init__ files re-export their public API; the imports are the API.
"dataforge/core/__init__.py" = ["F401"]

[tool.black]
line-length = 120
target-version = ["py310"]

[tool.mypy]
# No python_version pin: mypy's syntax parser gates PEP 695 constructs
# (e.g. numpy's bundled stubs) on this setting, but doesn't re-enforce
# older f-string grammar restrictions from it either (ruff's
# target-version covers that class of bug instead) - so pinning here
# only costs us stub compatibility for no added safety.
ignore_missing_imports = true
warn_unused_ignores = true
exclude = ["^build/", "^dist/", "^buildspec/"]

[tool.coverage.run]
source = ["dataforge"]

[tool.coverage.report]
show_missing = true
