repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=5000"]
      - id: check-toml
      - id: check-yaml

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: ["--fix"]

# black is configured in pyproject.toml for contributors who want to run
# it manually, but is intentionally not wired in here: it would reformat
# the codebase's existing compact guard-clause style (if x: y) on every
# file it touches, which conflicts with the E701/E702 ignores in
# pyproject.toml's [tool.ruff.lint] section.
